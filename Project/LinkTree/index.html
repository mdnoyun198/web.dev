<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Tree</title>
    <meta name="description" content="Responsive modern Link Tree profile page.">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-svg/dist/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="layout">

        <section class="profile-panel">


            <div class="profile-intro">
                <p class="eyebrow">QR Profile</p>
                <img class="avatar" src="https://avatars.githubusercontent.com/u/195098879?v=4"
                    alt="Profile picture of mdnoyun198">
                <h1>mdnoyun198</h1>
                <p class="bio">All my important social links, videos, code, and contact details in one clean place.</p>
            </div>


            <div class="profile-meta">
                <div class="meta-card stats-card">
                    <strong id="active-links-count">0</strong>
                    <span>Active links </span>
                </div>


                <div class="meta-card qr-card">
                    <span class="meta-label">Scan or share</span>
                    <div id="qrcode" aria-label="QR code for this page"></div>
                    <button class="download-btn" type="button" onclick="downloadSVG()">Download</button>
                </div>

            </div>

        </section>




        <section class="links-panel">

            <div class="links-head">
                <h2>My Links</h2>
                <p>Tap any link to open it from any device.</p>
            </div>


            
            <ul class="link-list" id="list">
                <!-- Links will be loaded from links.json and rendered by script.js -->
            </ul>


        </section>




    </main>

    <script src="script.js"></script>
</body>

</html>
